<div class="min-h-screen py-12 px-8 max-md:py-8 max-md:px-5">
  <header class="max-w-5xl mx-auto mb-12 max-md:mb-8">
    <volt-badge variant="outline" class="mb-4">{{ badge() }}</volt-badge>
    <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4 tracking-tight">
      {{ title() }}
    </h1>
    <p class="text-lg text-gray-500 mb-8 leading-relaxed max-w-2xl">{{ description() }}</p>

    @if (features().length > 0) {
      <div class="flex gap-4 flex-wrap">
        @for (feature of features(); track feature.title) {
          <volt-card class="min-w-[160px] flex-1 flex-basis-[160px]">
            <volt-card-header class="p-4 px-5">
              <volt-card-title class="text-sm">{{ feature.title }}</volt-card-title>
              <volt-card-description class="text-xs">{{
                feature.description
              }}</volt-card-description>
            </volt-card-header>
          </volt-card>
        }
      </div>
    }
  </header>

  <main class="max-w-5xl mx-auto">
    <ng-content />
  </main>
</div>
