<aside class="sidebar">
  <div class="sidebar__header">
    <div class="sidebar__logo">
      <svg width="28" height="28" viewBox="0 0 32 32" class="sidebar__logo-svg">
        <defs>
          <linearGradient id="qz-gradient-sidebar" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color: #10b981; stop-opacity: 1" />
            <stop offset="100%" style="stop-color: #6366f1; stop-opacity: 1" />
          </linearGradient>
        </defs>
        <path
          d="M16 2L28 14L16 30L4 14L16 2Z"
          stroke="url(#qz-gradient-sidebar)"
          stroke-width="2.5"
          stroke-linejoin="round"
          fill="rgba(16, 185, 129, 0.05)"
        />
        <path
          d="M16 2V14M4 14H28M16 14L4 14M16 14L28 14M16 14L16 30"
          stroke="url(#qz-gradient-sidebar)"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-dasharray="1 3"
        />
      </svg>
      <div class="sidebar__logo-text">
        <span class="sidebar__logo-title">Quartz Headless</span>
        <span class="sidebar__logo-subtitle">Headless Components</span>
      </div>
    </div>
  </div>

  <nav class="sidebar__nav">
    <div class="sidebar__section sidebar__section--nav">
      <a
        routerLink="/"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="sidebar__link"
      >
        <span class="sidebar__link-icon">⌂</span>
        <span>Home</span>
      </a>
      <a routerLink="/docs" routerLinkActive="sidebar__link--active" class="sidebar__link">
        <span class="sidebar__link-icon">📖</span>
        <span>Docs</span>
      </a>
    </div>

    <div class="sidebar__section">
      <span class="sidebar__section-title">Components</span>
      @for (item of components(); track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="sidebar__link--active"
          class="sidebar__link"
          [class.sidebar__link--soon]="item.soon"
        >
          <span class="sidebar__link-icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
          @if (item.soon) {
            <span class="sidebar__soon-badge">Soon</span>
          }
        </a>
      }
    </div>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__version">
      <span class="sidebar__version-dot"></span>
      <span>v0.0.1</span>
    </div>
  </div>
</aside>
