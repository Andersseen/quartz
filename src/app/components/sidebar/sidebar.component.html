<volt-sidebar
  class="flex flex-col h-full w-[260px] bg-[#0f0f13] border-r border-white/10 fixed left-0 top-0 bottom-0 max-md:relative"
>
  <volt-sidebar-header>
    <div class="flex items-center gap-3">
      <svg width="28" height="28" viewBox="0 0 32 32">
        <defs>
          <linearGradient id="qz-gradient-sidebar" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color: #10b981; stop-opacity: 1" />
            <stop offset="100%" style="stop-color: #6366f1; stop-opacity: 1" />
          </linearGradient>
        </defs>
        <path
          d="M16 2L28 14L16 30L4 14L16 2Z"
          stroke="url(#qz-gradient-sidebar)"
          stroke-width="2.5"
          stroke-linejoin="round"
          fill="rgba(16, 185, 129, 0.05)"
        />
        <path
          d="M16 2V14M4 14H28M16 14L4 14M16 14L28 14M16 14L16 30"
          stroke="url(#qz-gradient-sidebar)"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-dasharray="1 3"
        />
      </svg>
      <div class="flex flex-col">
        <span class="text-lg font-bold text-white tracking-tight">Quartz Headless</span>
        <span class="text-xs text-gray-500">Headless Components</span>
      </div>
    </div>
  </volt-sidebar-header>

  <volt-sidebar-content>
    <volt-sidebar-group>
      <volt-sidebar-item routerLink="/" label="Home" [exact]="true">
        <lmn-home slot="icon" [size]="16" />
      </volt-sidebar-item>
      <volt-sidebar-item routerLink="/docs" label="Docs">
        <lmn-bookmark slot="icon" [size]="16" />
      </volt-sidebar-item>
    </volt-sidebar-group>

    <volt-sidebar-group label="Components">
      @for (item of components(); track item.path) {
        <volt-sidebar-item
          [routerLink]="item.path"
          [label]="item.label"
          [class.opacity-50]="item.soon"
          [class.pointer-events-none]="item.soon"
        >
          @switch (item.icon) {
            @case ('bell') {
              <lmn-bell slot="icon" [size]="16" />
            }
            @case ('database') {
              <lmn-database slot="icon" [size]="16" />
            }
            @case ('grid') {
              <lmn-grid slot="icon" [size]="16" />
            }
            @case ('list') {
              <lmn-list slot="icon" [size]="16" />
            }
            @case ('file') {
              <lmn-file slot="icon" [size]="16" />
            }
            @case ('refresh') {
              <lmn-refresh-cw slot="icon" [size]="16" />
            }
            @case ('zap') {
              <lmn-zap slot="icon" [size]="16" />
            }
            @default {
              <lmn-package slot="icon" [size]="16" />
            }
          }
          @if (item.soon) {
            <volt-badge slot="trailing" variant="secondary">Soon</volt-badge>
          }
        </volt-sidebar-item>
      }
    </volt-sidebar-group>
  </volt-sidebar-content>

  <volt-sidebar-footer>
    <div class="flex items-center gap-2 text-xs text-gray-500">
      <span class="w-1.5 h-1.5 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]"></span>
      <span>v0.0.1</span>
    </div>
  </volt-sidebar-footer>
</volt-sidebar>
