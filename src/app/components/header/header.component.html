<header
  class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-fit pointer-events-none max-md:top-3 max-md:left-3 max-md:right-3 max-md:w-auto max-md:translate-x-0"
>
  <div
    class="pointer-events-auto flex items-center gap-8 bg-[#0f0f13]/70 backdrop-blur-xl border border-white/10 px-5 py-2 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.5)] max-md:gap-3 max-md:px-3 max-md:justify-between"
  >
    @if (isComponentRoute()) {
      <button
        class="hidden max-md:flex items-center justify-center w-8 h-8 border-none bg-transparent text-gray-400 hover:text-white hover:bg-white/5 rounded-lg transition-colors cursor-pointer"
        (click)="layout.toggle()"
        [attr.aria-expanded]="layout.sidebarOpen()"
        aria-label="Toggle navigation"
      >
        @if (layout.sidebarOpen()) {
          <lmn-x [size]="16" />
        } @else {
          <lmn-menu [size]="16" />
        }
      </button>
    }

    <a routerLink="/" class="flex items-center gap-2.5 no-underline">
      <svg width="24" height="24" viewBox="0 0 32 32">
        <defs>
          <linearGradient id="qz-gradient-header" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color: #10b981; stop-opacity: 1" />
            <stop offset="100%" style="stop-color: #6366f1; stop-opacity: 1" />
          </linearGradient>
        </defs>
        <path
          d="M16 2L28 14L16 30L4 14L16 2Z"
          stroke="url(#qz-gradient-header)"
          stroke-width="2.5"
          stroke-linejoin="round"
          fill="rgba(16, 185, 129, 0.05)"
        />
        <path
          d="M16 2V14M4 14H28M16 14L4 14M16 14L28 14M16 14L16 30"
          stroke="url(#qz-gradient-header)"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-dasharray="1 3"
        />
      </svg>
      <span class="font-bold text-[0.9375rem] tracking-tight text-white">Quartz Headless</span>
    </a>

    <nav class="flex items-center gap-2 max-md:hidden">
      <a
        routerLink="/"
        routerLinkActive="bg-violet-500/15 text-white shadow-[inset_0_0_0_1px_rgba(139,92,246,0.3)]"
        [routerLinkActiveOptions]="{ exact: true }"
        class="px-4 py-2 rounded-full text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-all"
        >Home</a
      >
      <a
        routerLink="/overlay"
        [class.bg-violet-500/15]="isComponentRoute()"
        [class.text-white]="isComponentRoute()"
        [class.shadow-\[inset_0_0_0_1px_rgba(139,92,246,0.3)\]]="isComponentRoute()"
        class="px-4 py-2 rounded-full text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-all"
        >Components</a
      >
      <a
        routerLink="/docs"
        routerLinkActive="bg-violet-500/15 text-white shadow-[inset_0_0_0_1px_rgba(139,92,246,0.3)]"
        class="px-4 py-2 rounded-full text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-all"
        >Docs</a
      >
      <a
        routerLink="/web-agnostic"
        routerLinkActive="bg-violet-500/15 text-white shadow-[inset_0_0_0_1px_rgba(139,92,246,0.3)]"
        class="px-4 py-2 rounded-full text-sm font-medium text-gray-400 hover:text-white hover:bg-white/5 transition-all"
        >Web Agnostic</a
      >
    </nav>

    <div class="flex items-center pl-2 border-l border-white/10">
      <a
        href="https://github.com/andersseen/quartz"
        target="_blank"
        class="flex items-center justify-center w-9 h-9 rounded-full text-gray-400 hover:text-white hover:bg-white/5 transition-all"
        aria-label="GitHub"
      >
        <lmn-github [size]="20" />
      </a>
    </div>
  </div>
</header>
