<section class="home__cta-section">
  <div class="home__cta-inner">
    <h2>Ready to craft your UI?</h2>
    <p>Zero dependencies, perfect accessibility, infinite styling.</p>

    <volt-card class="home__cta-card">
      <volt-card-content>
        <div class="npm-install">
          <span class="prompt">$</span> npm install quartz-headless
          <volt-button
            variant="outline"
            size="sm"
            (click)="copyInstallCommand()"
            [class.copied]="copied()"
          >
            {{ copied() ? '✓ Copied' : 'Copy' }}
          </volt-button>
        </div>
      </volt-card-content>
    </volt-card>
  </div>
</section>
